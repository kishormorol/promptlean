    <!-- Header -->
    <div class="mb-6">
      <h1 style="font-size: 1.75rem; margin-bottom: 6px;">Browse Prompts</h1>
      <p>Find the right prompt for your task. Each prompt includes Lean, Balanced, and Max Quality variants.</p>
    </div>

    <div class="layout-sidebar">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">Categories</div>

        </div>

        <div class="sidebar-section">
          <div class="sidebar-label">Tags</div>
          <div id="tag-cloud" class="tag-wrap"></div>
        </div>
      </aside>

      <!-- Main -->
      <div>

        <div class="search-bar mb-6">
          <span class="search-icon">🔍</span>
          <input type="search" class="search-input" id="search" placeholder="Search prompts..." autocomplete="off">
        </div>

        <div class="results-meta" id="results-meta"></div>
        <div class="grid-3" id="prompt-grid">
          <div class="text-3 text-sm">Loading...</div>
